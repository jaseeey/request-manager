name: Publish to npm

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main:refs/remotes/origin/main
          tag_commit="$(git rev-parse "${GITHUB_REF}^{commit}")"
          git merge-base --is-ancestor "$tag_commit" origin/main

      - name: Verify tag matches package version
        run: |
          node <<'NODE'
          const { readFileSync } = require('node:fs');

          const packageJson = JSON.parse(readFileSync('package.json', 'utf8'));
          const tagVersion = process.env.GITHUB_REF_NAME.replace(/^v/, '');

          if (packageJson.version !== tagVersion) {
              throw new Error(
                  `package.json version ${packageJson.version} does not match tag ${process.env.GITHUB_REF_NAME}`
              );
          }
          NODE

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit

      - name: Run tests
        run: npm test

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish package
        run: npm publish --access public
